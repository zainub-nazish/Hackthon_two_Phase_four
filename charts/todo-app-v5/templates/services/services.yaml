---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.websocketService.name }}-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.websocketService.name }}
    {{- include "todo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.websocketService.name }}
  ports:
    - name: http
      port: {{ .Values.websocketService.port }}
      targetPort: {{ .Values.websocketService.port }}
    - name: ws
      port: 8080
      targetPort: {{ .Values.websocketService.port }}
