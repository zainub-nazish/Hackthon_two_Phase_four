---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.recurringService.name }}-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.recurringService.name }}
    {{- include "todo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.recurringService.name }}
  ports:
    - name: http
      port: {{ .Values.recurringService.port }}
      targetPort: {{ .Values.recurringService.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.notificationService.name }}-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.notificationService.name }}
    {{- include "todo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.notificationService.name }}
  ports:
    - name: http
      port: {{ .Values.notificationService.port }}
      targetPort: {{ .Values.notificationService.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.auditService.name }}-svc
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.auditService.name }}
    {{- include "todo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.auditService.name }}
  ports:
    - name: http
      port: {{ .Values.auditService.port }}
