# ============================================================
# Task ID  : T050
# Title    : Helm — Consumer Service Deployments (recurring, notification, audit, websocket)
# Spec Ref : speckit.plan → Section 1.1: Architecture Overview
# Plan Ref : speckit.plan → Section 7B: Minikube deployment sequence
# ============================================================

---
# Recurring Task Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.recurringService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.recurringService.name }}
    {{- include "todo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.recurringService.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.recurringService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.recurringService.name }}
      annotations:
        {{- include "todo.daprAnnotations" (dict "appId" .Values.recurringService.daprAppId "appPort" .Values.recurringService.daprAppPort "Values" .Values) | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.recurringService.name }}
          image: {{ include "todo.image" (dict "image" .Values.recurringService.image "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.recurringService.port }}
          livenessProbe:
            {{- toYaml .Values.recurringService.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.recurringService.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.recurringService.resources | nindent 12 }}

